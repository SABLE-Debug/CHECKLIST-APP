/* ── GRAIN ── */
body::after{content:’’;position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:.022;
background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 200 200’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=’.85’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”)}

/* ── AURORA CANVAS ── */
#aurora{position:fixed;inset:0;z-index:0;width:100%;height:100%}

/* ── LOADER ── */
#loader{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100dvh;z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#050505;transition:opacity .8s,transform .8s cubic-bezier(.76,0,.24,1)}
#loader.out{opacity:0;transform:translateY(-8px);pointer-events:none}
.mp{fill:none;stroke:var(–g);stroke-linecap:round}
#ldr-bars{display:flex;gap:3px;align-items:flex-end;height:28px;margin-bottom:4px}
.lbar{width:3px;background:var(–g);border-radius:1px;height:3px;opacity:.7}
#ldr-wordmark{font-family:“Cormorant Garamond”,Georgia,serif;font-size:11px;font-weight:300;letter-spacing:.6em;color:#f0ece4;opacity:0;transition:opacity .6s;padding-right:.6em;margin-top:4px}
#ldr-wordmark.show{opacity:1}
#ldr-sub{font-size:7px;letter-spacing:.4em;color:rgba(201,168,76,.6);opacity:0;transition:opacity .5s .2s;padding-right:.4em;font-family:“Courier Prime”,monospace}
#ldr-sub.show{opacity:1}
#ldr-bar-wrap{width:140px;height:1px;background:rgba(201,168,76,.12);margin-top:6px;position:relative;overflow:hidden}
#ldr-bar-fill{position:absolute;top:0;left:0;height:100%;width:0%;background:linear-gradient(90deg,var(–g),var(–g2),var(–g));background-size:200%;transition:width .06s linear}
#ldr-bar-glow{position:absolute;top:-1px;right:-2px;width:10px;height:3px;background:var(–g2);filter:blur(3px);opacity:0}

/* ── APP SHELL ── */
#app{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100dvh;z-index:1;display:flex;flex-direction:column;opacity:0;transition:opacity .6s}
#app.show{opacity:1}

/* ── HEADER ── */
#header{
position:relative;z-index:10;
padding-top:max(52px, calc(env(safe-area-inset-top, 44px) + 14px));
padding-left:24px;padding-right:24px;padding-bottom:0;
background:linear-gradient(to bottom,rgba(5,5,5,.95) 0%,transparent 100%);
flex-shrink:0
}
#header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:relative}
#h-logo{font-family:var(–fd);font-size:13px;font-weight:300;letter-spacing:.5em;color:var(–g);padding-right:.5em}
#h-bars{display:flex;gap:3px;align-items:flex-end;height:18px}
.hbar{width:2px;background:var(–g);border-radius:1px;height:2px;opacity:.6}

/* spinning meridian mark — Y axis (coin flip, always upright) */
#h-mark{
position:absolute;left:50%;top:50%;
transform:translate(-50%,-50%);
width:32px;height:32px;
display:flex;align-items:center;justify-content:center;
pointer-events:none;
perspective:120px
}
#h-mark-svg{
width:32px;height:32px;overflow:visible;
animation:mark-spin-y 4s linear infinite;
transform-style:preserve-3d
}
@keyframes mark-spin-y{
0%  {transform:rotateY(0deg)}
100%{transform:rotateY(360deg)}
}
/* wave title — pure CSS, no SVG filter needed */
#h-title-wrap{padding-bottom:14px;position:relative;overflow:hidden}
#h-title-wrap::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(–g),transparent)}
#h-title{
font-family:var(–fd);font-size:clamp(14px,4vw,22px);font-weight:300;line-height:1;
color:var(–w);display:inline-block;position:relative
}
.wave-char{display:inline-block;animation:wave-char 3s ease-in-out infinite}
@keyframes wave-char{
0%,100%{transform:translateY(0) skewX(0deg)}
25%{transform:translateY(-2.5px) skewX(-1.5deg)}
50%{transform:translateY(0) skewX(0deg)}
75%{transform:translateY(2.5px) skewX(1.5deg)}
}

/* ── VIEWS ── */
#views{position:relative;flex:1;overflow:hidden}
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px max(100px, calc(env(safe-area-inset-bottom, 20px) + 88px));opacity:0;transform:translateX(24px);transition:opacity .4s,transform .4s cubic-bezier(.16,1,.3,1);pointer-events:none}
.view.on{opacity:1;transform:translateX(0);pointer-events:all}
.view.back{transform:translateX(-24px)}

/* ── BOTTOM BAR ── */
#bottom{
position:relative;z-index:10;
padding-top:12px;padding-left:20px;padding-right:20px;
padding-bottom:max(28px, calc(env(safe-area-inset-bottom, 20px) + 12px));
background:linear-gradient(to top,rgba(5,5,5,.95) 0%,transparent 100%);
flex-shrink:0
}
#add-btn{
width:100%;height:52px;border:1px solid var(–gm);background:none;
color:var(–w);font-family:var(–fm);font-size:9px;letter-spacing:.4em;
text-transform:uppercase;position:relative;overflow:hidden;cursor:pointer
}
#add-btn::before{content:’’;position:absolute;inset:0;background:var(–g);transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.76,0,.24,1)}
#add-btn:active::before{transform:scaleX(1)}
#add-btn span{position:relative;z-index:1;transition:color .35s}
#add-btn:active span{color:var(–b)}

/* ── HOME: LIST CARDS ── */
.lists-grid{display:flex;flex-direction:column;gap:2px;padding-top:20px}
.list-card{
position:relative;padding:20px 20px 18px;
border:1px solid rgba(201,168,76,.08);
background:rgba(5,5,5,.4);
cursor:pointer;overflow:hidden;
transition:border-color .25s,background .25s
}
.list-card::before{content:’’;position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.04) 0%,transparent 60%)}
.list-card:active{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.04)}
.lc-name{font-family:var(–fd);font-size:clamp(22px,6vw,32px);font-weight:300;color:var(–w);line-height:1.1;margin-bottom:10px;position:relative}
.lc-meta{display:flex;align-items:center;justify-content:space-between}
.lc-count{font-size:8px;letter-spacing:.3em;color:rgba(201,168,76,.5)}
.lc-prog{flex:1;height:1px;background:rgba(201,168,76,.1);margin:0 16px;overflow:hidden}
.lc-progf{height:100%;background:var(–g);transition:width .5s cubic-bezier(.16,1,.3,1)}
.lc-pct{font-size:8px;letter-spacing:.2em;color:rgba(201,168,76,.5)}
.lc-swipe-del{position:absolute;right:0;top:0;bottom:0;width:64px;background:rgba(180,40,40,.8);display:flex;align-items:center;justify-content:center;transform:translateX(100%);transition:transform .3s;font-size:11px;color:#fff}

/* shimmer on list names */
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.shimmer{background:linear-gradient(90deg,var(–w) 0%,var(–g) 30%,var(–g2) 50%,var(–g) 70%,var(–w) 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 1.8s ease forwards}

/* ── TASK LIST ── */
.tasks-wrap{padding-top:16px;display:flex;flex-direction:column;gap:2px}
.section-label{font-size:7px;letter-spacing:.45em;color:rgba(201,168,76,.35);padding:16px 0 8px;text-transform:uppercase}
.task-item{
position:relative;padding:14px 16px;
border:1px solid rgba(201,168,76,.07);
background:rgba(5,5,5,.5);overflow:hidden;
transition:border-color .3s,opacity .4s
}
.task-item.completing{opacity:.4}
.task-row{display:flex;align-items:center;gap:12px}
.task-check{
width:22px;height:22px;flex-shrink:0;border:1px solid rgba(201,168,76,.3);
border-radius:0;display:flex;align-items:center;justify-content:center;
cursor:pointer;position:relative;overflow:hidden;transition:all .3s
}
.task-check::after{content:’’;position:absolute;inset:0;background:var(–g);transform:scale(0);border-radius:50%;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.task-item.done .task-check{border-color:var(–g)}
.task-item.done .task-check::after{transform:scale(1.4)}
.task-check-mark{position:relative;z-index:1;opacity:0;transition:opacity .2s .1s;font-size:10px;color:var(–b);font-weight:700}
.task-item.done .task-check-mark{opacity:1}
.task-text{font-family:var(–fd);font-size:clamp(16px,4.5vw,22px);font-weight:300;flex:1;line-height:1.3;transition:color .4s}
.task-item.done .task-text{color:rgba(240,236,228,.25);text-decoration:line-through;text-decoration-color:rgba(201,168,76,.4)}

/* interval task */
.task-pips{display:flex;gap:4px;align-items:center;flex-shrink:0}
.pip{width:9px;height:9px;border-radius:50%;border:1px solid rgba(201,168,76,.25);transition:all .25s;cursor:pointer}
.pip.on{background:var(–g);border-color:var(–g);transform:scale(1.1)}
.task-frac{font-size:9px;color:var(–g);letter-spacing:.08em;min-width:28px;text-align:right;font-family:var(–fm)}

/* ── BURN EFFECT ── */
.burn-particle{position:absolute;pointer-events:none;border-radius:50%;z-index:20}
@keyframes burn-up{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(calc(-50% + var(–bx)),calc(-50% + var(–by))) scale(0);opacity:0}}
@keyframes burn-ember{0%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:.9}100%{transform:translate(calc(-50% + var(–bx)),calc(-50% + var(–by))) scale(.2) rotate(180deg);opacity:0}}

/* burst particles */
.burst{position:absolute;width:5px;height:5px;border-radius:50%;background:var(–g);pointer-events:none;z-index:20}
@keyframes burst-out{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(calc(-50% + var(–bx)),calc(-50% + var(–by))) scale(0);opacity:0}}

/* pip pop */
@keyframes pip-pop{0%{transform:scale(0)}60%{transform:scale(1.6)}100%{transform:scale(1.1)}}
.pip.popping{animation:pip-pop .35s cubic-bezier(.34,1.56,.64,1) forwards}

/* completion flash */
@keyframes flash-gold{0%,100%{background:transparent}50%{background:rgba(201,168,76,.08)}}

/* ── MODAL ── */
#modal{position:fixed;inset:0;z-index:8000;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
#modal.on{opacity:1;pointer-events:all}
#modal-backdrop{position:absolute;inset:0;background:rgba(5,5,5,.7)}
#modal-sheet{
position:relative;z-index:1;
background:rgba(8,8,8,.97);border-top:1px solid rgba(201,168,76,.15);
padding:24px 24px calc(var(–safe-bot) + 24px);
transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)
}
#modal.on #modal-sheet{transform:translateY(0)}
.modal-title{font-family:var(–fd);font-size:18px;font-weight:300;color:var(–g);letter-spacing:.1em;margin-bottom:20px}
.modal-input{
width:100%;background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.15);
color:var(–w);font-family:var(–fd);font-size:18px;font-weight:300;
padding:12px 14px;letter-spacing:.05em;outline:none;margin-bottom:12px
}
.modal-input:focus{border-color:rgba(201,168,76,.4)}
.modal-input::placeholder{color:rgba(240,236,228,.2)}
.modal-row{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.modal-label{font-size:8px;letter-spacing:.3em;color:rgba(201,168,76,.5);white-space:nowrap}
.modal-seg{display:flex;gap:4px}
.seg-btn{font-size:8px;letter-spacing:.2em;color:rgba(240,236,228,.4);border:1px solid rgba(201,168,76,.1);background:none;padding:6px 10px;cursor:pointer;transition:all .2s}
.seg-btn.on{color:var(–g);border-color:var(–gm);background:rgba(201,168,76,.06)}
.modal-num{width:52px;background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.12);color:var(–w);font-family:var(–fm);font-size:14px;padding:6px 10px;text-align:center;outline:none}
.modal-num:focus{border-color:rgba(201,168,76,.4)}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.mbtn-cancel{flex:1;height:46px;background:none;border:1px solid rgba(201,168,76,.12);color:rgba(240,236,228,.4);font-family:var(–fm);font-size:8px;letter-spacing:.3em;cursor:pointer}
.mbtn-add{flex:2;height:46px;background:var(–g);border:none;color:var(–b);font-family:var(–fm);font-size:8px;letter-spacing:.35em;cursor:pointer;font-weight:700;position:relative;overflow:hidden}
.mbtn-add:active{opacity:.85}

/* back button */
#back-btn{font-size:9px;letter-spacing:.3em;color:rgba(201,168,76,.6);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;margin-bottom:4px;transition:color .2s}
#back-btn:active{color:var(–g)}
#back-btn::before{content:‘←’}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:rgba(240,236,228,.2)}
.empty-title{font-family:var(–fd);font-size:24px;font-weight:300;margin-bottom:8px}
.empty-sub{font-size:8px;letter-spacing:.3em}

/* done section */
.tasks-done{margin-top:24px}
.done-toggle{font-size:8px;letter-spacing:.35em;color:rgba(201,168,76,.3);cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent}
.done-toggle::before{content:’’;width:24px;height:1px;background:rgba(201,168,76,.15)}
.done-list{display:flex;flex-direction:column;gap:2px;margin-top:8px}

/* ── RIPPLE ── */
.ripple{position:absolute;border-radius:50%;background:rgba(201,168,76,.1);transform:scale(0);pointer-events:none}
@keyframes ripple-out{to{transform:scale(1);opacity:0}}
</style>

</head>
<body>

<!-- AURORA -->

<canvas id="aurora"></canvas>

<!-- NOISE SVG FILTER -->

<svg style="position:fixed;width:0;height:0">
  <defs>
    <filter id="turb-f" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence id="turb-n" type="turbulence" baseFrequency="0.018 0.018" numOctaves="3" seed="5"/>
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="0" id="disp-n" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- LOADER -->

<div id="loader">
  <div id="ldr-bars"></div>
  <svg width="64" height="70" viewBox="0 0 80 88" style="overflow:visible">
    <circle id="lo" cx="40" cy="44" r="32" class="mp" stroke-width="1.1" stroke-dasharray="201" stroke-dashoffset="201" style="transition:stroke-dashoffset 1.1s cubic-bezier(.76,0,.24,1)"/>
    <circle id="li" cx="40" cy="44" r="20" class="mp" stroke-width=".9" stroke-dasharray="126" stroke-dashoffset="126" style="transition:stroke-dashoffset .8s .25s cubic-bezier(.76,0,.24,1)"/>
    <line id="lv" x1="40" y1="6" x2="40" y2="82" class="mp" stroke-width=".9" stroke-dasharray="76" stroke-dashoffset="76" style="transition:stroke-dashoffset .7s .4s cubic-bezier(.76,0,.24,1)"/>
    <line id="lh" x1="2" y1="44" x2="78" y2="44" class="mp" stroke-width=".8" stroke-dasharray="76" stroke-dashoffset="76" style="transition:stroke-dashoffset .7s .5s cubic-bezier(.76,0,.24,1)"/>
    <line id="lk" x1="28" y1="29" x2="52" y2="29" class="mp" stroke-width=".7" stroke-dasharray="24" stroke-dashoffset="24" opacity=".8" style="transition:stroke-dashoffset .45s .7s cubic-bezier(.76,0,.24,1)"/>
    <circle id="ld" cx="40" cy="9" r="3.5" fill="#C9A84C" opacity="0" style="transition:opacity .35s .9s"/>
  </svg>
  <div id="ldr-wordmark">AKHARA</div>
  <div id="ldr-sub">LISTS</div>
  <div id="ldr-bar-wrap"><div id="ldr-bar-fill"></div><div id="ldr-bar-glow"></div></div>
</div>

<!-- APP -->

<div id="app">
  <div id="header">
    <div id="header-top">
      <div id="h-logo">AKHARA</div>
      <!-- Spinning Meridian Mark — top center -->
      <div id="h-mark">
        <svg id="h-mark-svg" viewBox="0 0 80 88">
          <circle cx="40" cy="44" r="32" fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity=".55"/>
          <circle cx="40" cy="44" r="20" fill="none" stroke="#C9A84C" stroke-width=".8" stroke-opacity=".45"/>
          <line x1="40" y1="6" x2="40" y2="82" stroke="#C9A84C" stroke-width=".8" stroke-linecap="round" stroke-opacity=".5"/>
          <line x1="2" y1="44" x2="78" y2="44" stroke="#C9A84C" stroke-width=".7" stroke-linecap="round" stroke-opacity=".45"/>
          <line x1="28" y1="29" x2="52" y2="29" stroke="#C9A84C" stroke-width=".65" stroke-linecap="round" stroke-opacity=".4"/>
          <circle id="h-mark-dot" cx="40" cy="9" r="3" fill="#C9A84C"/>
        </svg>
      </div>
      <div id="h-bars"></div>
    </div>
    <div id="h-title-wrap"><div id="h-title"></div></div>
  </div>

  <div id="views">
    <!-- HOME VIEW -->
    <div class="view on" id="view-home">
      <div class="lists-grid" id="lists-grid"></div>
    </div>
    <!-- LIST VIEW -->
    <div class="view" id="view-list">
      <button id="back-btn" onclick="goHome()">ALL LISTS</button>
      <div class="tasks-wrap" id="tasks-wrap"></div>
    </div>
  </div>

  <div id="bottom">
    <button id="add-btn" onclick="openModal()"><span id="add-label">NEW LIST</span></button>
  </div>
</div>

<!-- MODAL -->

<div id="modal">
  <div id="modal-backdrop" onclick="closeModal()"></div>
  <div id="modal-sheet">
    <div class="modal-title" id="modal-title">New List</div>
    <input class="modal-input" id="modal-name" placeholder="Name…" autocomplete="off" autocorrect="off" spellcheck="false">
    <!-- task type row (shown in list view) -->
    <div id="modal-type-row" class="modal-row" style="display:none">
      <span class="modal-label">TYPE</span>
      <div class="modal-seg">
        <button class="seg-btn on" id="seg-simple" onclick="setTaskType('simple')">SIMPLE</button>
        <button class="seg-btn" id="seg-interval" onclick="setTaskType('interval')">INTERVAL</button>
      </div>
    </div>
    <div id="modal-interval-row" class="modal-row" style="display:none">
      <span class="modal-label">STEPS</span>
      <input class="modal-num" id="modal-steps" type="number" min="2" max="50" value="3">
      <span class="modal-label" style="margin-left:4px">MAX 50</span>
    </div>
    <div class="modal-btns">
      <button class="mbtn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="mbtn-add" id="modal-confirm" onclick="confirmModal()">ADD</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state = JSON.parse(localStorage.getItem('akhara-lists-v3') || 'null') || { lists: [] };
let currentListId = null;
let modalMode = 'list'; // 'list' | 'task'
let taskType = 'simple';
function save(){ localStorage.setItem('akhara-lists-v3', JSON.stringify(state)); }
function genId(){ return Math.random().toString(36).slice(2,9); }

// ═══════════════════════════════════════════════
// AURORA BACKGROUND
// ═══════════════════════════════════════════════
(function initAurora(){
  const cv = document.getElementById('aurora');
  function resize(){ cv.width = window.innerWidth; cv.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize, {passive:true});
  const ctx = cv.getContext('2d');
  let t = 0;
  const blobs = [
    {x:.25,y:.35,r:.55,h:42,sx:.0003,sy:.0002},
    {x:.75,y:.65,r:.5,h:35,sx:-.0002,sy:.00025},
    {x:.55,y:.25,r:.45,h:48,sx:.00035,sy:-.0002},
    {x:.15,y:.75,r:.4,h:38,sx:-.00025,sy:.0003},
    {x:.85,y:.2,r:.38,h:44,sx:.0002,sy:.00028},
  ];
  (function loop(){
    requestAnimationFrame(loop);
    const W=cv.width,H=cv.height;
    ctx.fillStyle='rgba(5,5,5,.055)'; ctx.fillRect(0,0,W,H);
    t += .0015;
    blobs.forEach((b,i)=>{
      const bx = b.x + Math.sin(t*1.1+i*1.3)*0.1;
      const by = b.y + Math.cos(t*0.9+i*1.1)*0.08;
      const g = ctx.createRadialGradient(bx*W,by*H,0,bx*W,by*H,b.r*Math.min(W,H));
      const hue = b.h + Math.sin(t*0.7+i)*6;
      g.addColorStop(0,`hsla(${hue},65%,42%,.14)`);
      g.addColorStop(.4,`hsla(${hue},55%,32%,.06)`);
      g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(bx*W,by*H,b.r*Math.min(W,H),0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    // shimmer lines
    for(let i=0;i<4;i++){
      const y=(Math.sin(t*.4+i*1.8)+1)/2*H;
      const g2=ctx.createLinearGradient(0,y,W,y);
      g2.addColorStop(0,'transparent');
      g2.addColorStop(.35,`rgba(201,168,76,.025)`);
      g2.addColorStop(.5,`rgba(201,168,76,.05)`);
      g2.addColorStop(.65,`rgba(201,168,76,.025)`);
      g2.addColorStop(1,'transparent');
      ctx.fillStyle=g2; ctx.fillRect(0,y-1.5,W,3);
    }
  })();
})();

// ═══════════════════════════════════════════════
// LOADER
// ═══════════════════════════════════════════════
(function initLoader(){
  // equaliser bars
  const lbarWrap = document.getElementById('ldr-bars');
  for(let i=0;i<14;i++){const b=document.createElement('div');b.className='lbar';lbarWrap.appendChild(b);}
  function animBars(wrap,cls){
    wrap.querySelectorAll('.'+cls).forEach((b,i)=>{
      const h=()=>b.style.height=(Math.random()*22+3)+'px';
      h(); setInterval(h,250+i*30);
    });
  }
  animBars(lbarWrap,'lbar');

  // draw meridian mark
  function drawMark(pre){
    ['o','i','v','h','k'].forEach(s=>{
      const el=document.getElementById(pre+s); if(!el)return;
      el.style.transition='none'; el.style.strokeDashoffset=el.getAttribute('stroke-dasharray');
    });
    const d=document.getElementById(pre+'d'); if(d){d.style.transition='none';d.style.opacity='0';}
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      ['o','i','v','h','k'].forEach(s=>{const el=document.getElementById(pre+s);if(el){el.style.transition='';el.style.strokeDashoffset='0';}});
      if(d){d.style.transition='';d.style.opacity='1';}
    }));
  }

  let cnt=0;
  const ldrFill=document.getElementById('ldr-bar-fill');
  const ldrGlow=document.getElementById('ldr-bar-glow');
  const iv=setInterval(()=>{
    cnt=Math.min(cnt+Math.floor(Math.random()*8)+3,100);
    ldrFill.style.width=cnt+'%';
    ldrGlow.style.opacity=cnt<100?'1':'0';
    ldrGlow.style.right=(100-cnt)+'%';
    if(cnt>=100)clearInterval(iv);
  },40);

  function runLoader(){
    drawMark('l');
    setTimeout(()=>{
      document.getElementById('ldr-wordmark').classList.add('show');
      document.getElementById('ldr-sub').classList.add('show');
    },1100);
    setTimeout(()=>{
      document.getElementById('loader').classList.add('out');
      setTimeout(()=>{
        document.getElementById('loader').style.display='none';
        document.getElementById('app').classList.add('show');
        renderHome();
      },850);
    },2600);
  }

  // Wait for fonts AND page load before starting loader sequence
  function startWhenReady(){
    if(typeof document.fonts !== 'undefined'){
      // Use FontFace API — waits until fonts are actually painted
      Promise.race([
        document.fonts.ready,
        new Promise(r=>setTimeout(r,2500)) // hard timeout fallback
      ]).then(()=>setTimeout(runLoader,80));
    } else {
      // Fallback for older browsers
      if(document.readyState==='complete') setTimeout(runLoader,200);
      else window.addEventListener('load',()=>setTimeout(runLoader,200));
    }
  }
  startWhenReady();
})();

// ═══════════════════════════════════════════════
// HEADER EQUALISER BARS
// ═══════════════════════════════════════════════
(function initHeaderBars(){
  const wrap = document.getElementById('h-bars');
  for(let i=0;i<10;i++){const b=document.createElement('div');b.className='hbar';wrap.appendChild(b);}
  wrap.querySelectorAll('.hbar').forEach((b,i)=>{
    function pulse(){b.style.height=(Math.random()*14+2)+'px';b.style.opacity=(.3+Math.random()*.4).toString();}
    pulse(); setInterval(pulse,300+i*28);
  });
})();

// ═══════════════════════════════════════════════
// NOISE DISTORT (breathing)
// ═══════════════════════════════════════════════
(function initNoise(){
  let t=0;
  const tn=document.getElementById('turb-n'),dn=document.getElementById('disp-n');
  (function loop(){
    requestAnimationFrame(loop); t+=.002;
    const bf=0.012+Math.sin(t)*.005; tn.setAttribute('baseFrequency',bf+' '+bf);
    dn.setAttribute('scale',3+Math.sin(t*.6)*2);
  })();
})();

// ═══════════════════════════════════════════════
// GLITCH SCRAMBLE
// ═══════════════════════════════════════════════
function scramble(el, target, cb){
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .-_';
  let it=0;
  const upper=target.toUpperCase();
  const iv=setInterval(()=>{
    el.textContent=upper.split('').map((c,i)=>i<it?target[i]:chars[Math.floor(Math.random()*chars.length)]).join('');
    it+=.5; if(it>=target.length){el.textContent=target;clearInterval(iv);if(cb)cb();}
  },28);
}

// ═══════════════════════════════════════════════
// GOLD SHIMMER
// ═══════════════════════════════════════════════
function applyShimmer(el){
  el.classList.remove('shimmer'); void el.offsetWidth; el.classList.add('shimmer');
  setTimeout(()=>el.classList.remove('shimmer'),2000);
}

// ═══════════════════════════════════════════════
// BURN EFFECT
// ═══════════════════════════════════════════════
function burnEffect(el){
  const rect=el.getBoundingClientRect();
  const colors=['#C9A84C','#e8c96a','#ff9a00','#ff6600','#ff3300'];
  const count=22;
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='burn-particle';
    const size=Math.random()*6+2;
    const angle=Math.random()*Math.PI*2;
    const dist=Math.random()*55+20;
    const bx=Math.cos(angle)*dist;
    const by=-(Math.random()*60+10); // mostly upward
    const color=colors[Math.floor(Math.random()*colors.length)];
    const dur=Math.random()*500+400;
    p.style.cssText=`
      width:${size}px;height:${size}px;
      background:${color};
      left:${Math.random()*rect.width}px;
      top:${rect.height*.7}px;
      --bx:${bx}px;--by:${by}px;
      box-shadow:0 0 ${size*2}px ${color};
      animation:burn-up ${dur}ms cubic-bezier(.2,0,.8,1) forwards;
      animation-delay:${Math.random()*150}ms
    `;
    el.appendChild(p);
    setTimeout(()=>p.remove(),dur+200);
  }
  // ember sparks
  for(let i=0;i<8;i++){
    const p=document.createElement('div');
    p.className='burn-particle';
    const size=Math.random()*3+1;
    const bx=(Math.random()-.5)*80;
    const by=-(Math.random()*80+30);
    p.style.cssText=`
      width:${size}px;height:${size}px;
      background:#ff9a00;
      left:${Math.random()*rect.width}px;
      top:${rect.height*.5}px;
      --bx:${bx}px;--by:${by}px;
      border-radius:1px;
      animation:burn-ember ${Math.random()*700+500}ms ease-out forwards;
      animation-delay:${Math.random()*100}ms
    `;
    el.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}

// burst particles
function burstEffect(el, cx, cy){
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    p.className='burst';
    const angle=(i/12)*Math.PI*2;
    const dist=Math.random()*40+20;
    const bx=Math.cos(angle)*dist;
    const by=Math.sin(angle)*dist;
    p.style.cssText=`left:${cx}px;top:${cy}px;--bx:${bx}px;--by:${by}px;
      animation:burst-out ${Math.random()*300+400}ms cubic-bezier(.2,0,.8,1) forwards;
      animation-delay:${Math.random()*80}ms;
      background:${Math.random()>.5?'var(--g)':'var(--g2)'}`;
    el.appendChild(p);
    setTimeout(()=>p.remove(),600);
  }
}

// ripple
function rippleEffect(el,e){
  const r=el.getBoundingClientRect();
  const d=document.createElement('div');d.className='ripple';
  const sz=Math.max(r.width,r.height)*2.4;
  const x=(e.clientX||r.left+r.width/2)-r.left-sz/2;
  const y=(e.clientY||r.top+r.height/2)-r.top-sz/2;
  d.style.cssText=`width:${sz}px;height:${sz}px;left:${x}px;top:${y}px;animation:ripple-out .55s ease forwards`;
  el.appendChild(d); setTimeout(()=>d.remove(),580);
}

// ═══════════════════════════════════════════════
// HOME VIEW
// ═══════════════════════════════════════════════
function renderHome(){
  const grid=document.getElementById('lists-grid');
  grid.innerHTML='';
  setHeader('Lists.',false);
  document.getElementById('add-label').textContent='NEW LIST';

  if(!state.lists.length){
    grid.innerHTML=`<div class="empty"><div class="empty-title">The arena is empty.</div><div class="empty-sub">CREATE YOUR FIRST LIST</div></div>`;
    return;
  }

  state.lists.forEach(list=>{
    const total=list.tasks.length;
    const done=list.tasks.filter(t=>t.type==='simple'?t.done:(t.current>=t.max)).length;
    const pct=total?Math.round(done/total*100):0;

    const card=document.createElement('div');
    card.className='list-card';
    card.innerHTML=`
      <div class="lc-name">${list.name}</div>
      <div class="lc-meta">
        <span class="lc-count">${done}/${total} TASKS</span>
        <div class="lc-prog"><div class="lc-progf" style="width:${pct}%"></div></div>
        <span class="lc-pct">${pct}%</span>
      </div>
    `;
    card.addEventListener('click',()=>openList(list.id));

    // swipe to delete
    let startX=0,dragging=false;
    card.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;dragging=false;},{passive:true});
    card.addEventListener('touchmove',e=>{
      const dx=startX-e.touches[0].clientX;
      if(dx>10){dragging=true;card.style.transform='translateX(-'+Math.min(dx,64)+'px)';}
    },{passive:true});
    card.addEventListener('touchend',e=>{
      const dx=startX-e.changedTouches[0].clientX;
      if(dx>50){
        card.style.transition='transform .3s,opacity .3s';card.style.transform='translateX(-100%)';card.style.opacity='0';
        setTimeout(()=>{state.lists=state.lists.filter(l=>l.id!==list.id);save();renderHome();},320);
      } else {card.style.transform='';card.style.transition='transform .3s';setTimeout(()=>card.style.transition='',350);}
    },{passive:true});

    grid.appendChild(card);

    // stagger in
    card.style.opacity='0';card.style.transform='translateY(12px)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      card.style.transition='opacity .5s,transform .5s';
      card.style.opacity='1';card.style.transform='translateY(0)';
    }));
  });
}

// ═══════════════════════════════════════════════
// LIST VIEW
// ═══════════════════════════════════════════════
function openList(id){
  currentListId=id;
  const list=state.lists.find(l=>l.id===id);
  if(!list)return;

  document.getElementById('add-label').textContent='ADD TASK';
  document.getElementById('view-home').classList.add('back');
  document.getElementById('view-home').classList.remove('on');
  const vl=document.getElementById('view-list');
  vl.classList.add('on');
  vl.classList.remove('back');

  // header title with scramble + shimmer
  setHeader(list.name, true);

  renderTasks(list);
}

function buildWaveTitle(el, text){
  el.innerHTML='';
  [...text].forEach((ch,i)=>{
    const s=document.createElement('span');
    s.className='wave-char';
    s.textContent=ch===' '?' ':ch;
    // offset each char's phase so they ripple across like a wave
    s.style.animationDelay=(i*0.12)+'s';
    el.appendChild(s);
  });
}
function setHeader(name, scrambleIt){
  const el=document.getElementById('h-title');
  if(scrambleIt){
    // scramble first, then wave + shimmer
    scramble(el, name, ()=>{
      buildWaveTitle(el, name);
      applyShimmer(el);
    });
  } else {
    buildWaveTitle(el, name);
  }
}

function renderTasks(list){
  const wrap=document.getElementById('tasks-wrap');
  wrap.innerHTML='';

  const active=list.tasks.filter(t=>!(t.type==='simple'?t.done:(t.current>=t.max)));
  const done=list.tasks.filter(t=>t.type==='simple'?t.done:(t.current>=t.max));

  if(!active.length&&!done.length){
    wrap.innerHTML=`<div class="empty"><div class="empty-title">Empty.</div><div class="empty-sub">TAP + TO ADD TASKS</div></div>`;
    return;
  }

  // active tasks
  active.forEach((task,i)=>{
    wrap.appendChild(makeTaskEl(task,list,i));
  });

  // done section
  if(done.length){
    const sec=document.createElement('div');sec.className='tasks-done';
    const tog=document.createElement('div');tog.className='done-toggle';tog.textContent=`COMPLETED  ${done.length}`;
    const dl=document.createElement('div');dl.className='done-list';dl.style.display='none';
    tog.onclick=()=>{dl.style.display=dl.style.display==='none'?'flex':'none';dl.style.flexDirection='column';dl.style.gap='2px';};
    done.forEach(task=>dl.appendChild(makeTaskEl(task,list,-1)));
    sec.appendChild(tog);sec.appendChild(dl);
    wrap.appendChild(sec);
  }
}

function makeTaskEl(task, list, idx){
  const el=document.createElement('div');
  el.className='task-item'+(task.done||task.current>=task.max?' done':'');
  el.dataset.taskId=task.id;

  if(task.type==='interval'){
    const pips=Array.from({length:task.max},(_,i)=>`<span class="pip${i<task.current?' on':''}" data-pip="${i}"></span>`).join('');
    el.innerHTML=`<div class="task-row"><div class="task-pips">${pips}</div><span class="task-text">${task.text}</span><span class="task-frac">${task.current}/${task.max}</span></div>`;
    el.querySelectorAll('.pip').forEach(pip=>{
      pip.addEventListener('click',e=>{e.stopPropagation();tapInterval(task,list,el,pip);});
    });
    el.addEventListener('click',e=>{
      if(e.target.classList.contains('pip'))return;
      tapInterval(task,list,el,null);
    });
  } else {
    el.innerHTML=`<div class="task-row"><div class="task-check"><span class="task-check-mark">✓</span></div><span class="task-text">${task.text}</span></div>`;
    el.querySelector('.task-check').addEventListener('click',e=>{e.stopPropagation();tapSimple(task,list,el,e);});
    el.addEventListener('click',e=>tapSimple(task,list,el,e));
  }

  // stagger in
  if(idx>=0){
    el.style.opacity='0';el.style.transform='translateY(8px)';
    setTimeout(()=>{
      el.style.transition='opacity .4s,transform .4s';
      el.style.opacity='1';el.style.transform='translateY(0)';
    },idx*60);
  }

  return el;
}

function tapSimple(task,list,el,e){
  if(task.done)return;
  task.done=true; save();
  el.classList.add('done');
  // burst + burn
  const chk=el.querySelector('.task-check');
  if(chk){
    const cr=chk.getBoundingClientRect(),er=el.getBoundingClientRect();
    burstEffect(el,cr.left-er.left+cr.width/2,cr.top-er.top+cr.height/2);
  }
  burnEffect(el);
  el.style.animation='flash-gold .5s ease';
  // shimmer the text
  const txt=el.querySelector('.task-text');
  if(txt)applyShimmer(txt);
  setTimeout(()=>{ el.style.animation=''; const l=state.lists.find(x=>x.id===list.id);renderTasks(l); },900);
}

function tapInterval(task,list,el,pipEl){
  if(task.current>=task.max)return;
  task.current++;
  save();

  // find which pip just lit
  const pips=el.querySelectorAll('.pip');
  const justLit=pips[task.current-1];
  if(justLit){
    justLit.classList.add('on','popping');
    setTimeout(()=>justLit.classList.remove('popping'),400);
    const pr=justLit.getBoundingClientRect(),er=el.getBoundingClientRect();
    burstEffect(el,pr.left-er.left+pr.width/2,pr.top-er.top+pr.height/2);
  }
  el.querySelector('.task-frac').textContent=task.current+'/'+task.max;
  rippleEffect(el,{clientX:0,clientY:0});

  if(task.current>=task.max){
    el.classList.add('done');
    burnEffect(el);
    const txt=el.querySelector('.task-text');
    if(txt)applyShimmer(txt);
    setTimeout(()=>{const l=state.lists.find(x=>x.id===list.id);renderTasks(l);},900);
  }
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function goHome(){
  currentListId=null;
  document.getElementById('view-list').classList.remove('on');
  const vh=document.getElementById('view-home');
  vh.classList.remove('back');vh.classList.add('on');
  setHeader('Lists.',false);
  document.getElementById('add-label').textContent='NEW LIST';
  renderHome();
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function openModal(){
  modalMode=currentListId?'task':'list';
  taskType='simple';
  document.getElementById('modal-name').value='';
  document.getElementById('modal-steps').value='3';
  document.getElementById('modal-title').textContent=modalMode==='list'?'New List':'New Task';
  document.getElementById('modal-confirm').textContent=modalMode==='list'?'CREATE':'ADD';
  document.getElementById('modal-type-row').style.display=modalMode==='task'?'flex':'none';
  document.getElementById('modal-interval-row').style.display='none';
  document.getElementById('seg-simple').classList.add('on');
  document.getElementById('seg-interval').classList.remove('on');
  document.getElementById('modal').classList.add('on');
  setTimeout(()=>document.getElementById('modal-name').focus(),420);
}
function closeModal(){
  document.getElementById('modal').classList.remove('on');
  document.getElementById('modal-name').blur();
}
function setTaskType(type){
  taskType=type;
  document.getElementById('seg-simple').classList.toggle('on',type==='simple');
  document.getElementById('seg-interval').classList.toggle('on',type==='interval');
  document.getElementById('modal-interval-row').style.display=type==='interval'?'flex':'none';
}
function confirmModal(){
  const name=document.getElementById('modal-name').value.trim();
  if(!name)return;
  if(modalMode==='list'){
    state.lists.push({id:genId(),name,tasks:[]});
    save(); closeModal(); renderHome();
  } else {
    const list=state.lists.find(l=>l.id===currentListId);
    if(!list)return;
    if(taskType==='interval'){
      const steps=Math.max(2,Math.min(50,parseInt(document.getElementById('modal-steps').value)||3));
      list.tasks.push({id:genId(),text:name,type:'interval',max:steps,current:0});
    } else {
      list.tasks.push({id:genId(),text:name,type:'simple',done:false});
    }
    save(); closeModal(); renderTasks(list);
  }
}
document.getElementById('modal-name').addEventListener('keydown',e=>{if(e.key==='Enter')confirmModal();});

// handle back swipe
let appSwipeX=0;
document.addEventListener('touchstart',e=>{appSwipeX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-appSwipeX;
  if(dx>80&&currentListId&&document.getElementById('view-list').classList.contains('on'))goHome();
},{passive:true});
</script>
